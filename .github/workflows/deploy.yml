name: Angular CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install

      - name: Build Angular
        run: npm run build

      # Upload Build Artifact
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-build
          path: dist/EmployeePortal/browser

      # Download Build Artifact
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: angular-build
          path: deploy

      - name: Deploy to IIS
        shell: powershell
        run: |
          $destination = "C:\inetpub\wwwroot\EmployeePortal"

          Remove-Item "$destination\*" -Recurse -Force -ErrorAction SilentlyContinue

          Copy-Item `
          "deploy\*" `
          $destination `
          -Recurse `
          -Force
